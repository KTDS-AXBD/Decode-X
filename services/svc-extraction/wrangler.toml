name = "svc-extraction"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8702
inspector_port = 9202

[[d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure"
database_id = "698c88b5-5355-401d-960a-4d8aa74c3b2c"
migrations_dir = "../../infra/migrations/db-structure"

# Pipeline event bus producer (to emit extraction.completed)
[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

# Service binding to svc-ingestion for fetching parsed chunks
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

# R2 bucket for spec package storage (Phase 2-C)
[[r2_buckets]]
binding = "R2_SPEC_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-extraction"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET            — inter-service auth (X-Internal-Secret)
# CLOUDFLARE_AI_GATEWAY_URL      — full OpenRouter URL via CF AI Gateway (TD-44)
# OPENROUTER_API_KEY             — OpenRouter bearer token (TD-44)

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-extraction" }

[[env.staging.d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure-staging"
database_id = "5567133d-b0b5-496d-bf8f-0ef1dea62075"
migrations_dir = "../../infra/migrations/db-structure"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

[[env.staging.r2_buckets]]
binding = "R2_SPEC_PACKAGES"
bucket_name = "ai-foundry-skill-packages-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-extraction" }

[[env.production.d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure"
database_id = "698c88b5-5355-401d-960a-4d8aa74c3b2c"
migrations_dir = "../../infra/migrations/db-structure"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-production"

[[env.production.r2_buckets]]
binding = "R2_SPEC_PACKAGES"
bucket_name = "ai-foundry-skill-packages"
