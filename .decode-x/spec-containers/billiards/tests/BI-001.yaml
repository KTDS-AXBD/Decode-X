# BI-001 ThresholdCheck 검증 시나리오
# Billiards hall별 동시 table 한도 — F563 Sprint 391

ruleId: BI-001
detector: ThresholdCheck
function: reserveTable

scenarios:
  - id: BI-001-PASS
    description: 동시 table 수가 한도 미만일 때 table 예약 성공
    given:
      billiard_halls:
        active_tables: 19
        max_concurrent_tables: 20
    when:
      call: reserveTable
    then:
      result: success
      ruleId: BI-001
      status: PRESENCE

  - id: BI-001-FAIL
    description: 동시 table 수가 한도에 달했을 때 table 예약 차단
    given:
      billiard_halls:
        active_tables: 20
        max_concurrent_tables: 20
    when:
      call: reserveTable
    then:
      throws: BilliardsError
      code: E422-TABLE-LIMIT-EXCEEDED
      status: 422
