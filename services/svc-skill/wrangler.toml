name = "svc-skill"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill"
database_id = "a3f582ba-21b6-4008-9c41-deed94f9d237"

[[r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service binding to svc-llm-router for LLM tier routing
[[services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

[[queues.consumers]]
queue = "ai-foundry-pipeline"
max_batch_size = 5
max_batch_timeout = 30

[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-skill"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
