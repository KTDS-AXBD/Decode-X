# Test Scenarios — TR-001 ~ TR-006 (대표)
ruleId: TR-001
domain: travel
function: bookFlight
detector: ThresholdCheck (F445 Path A)

scenarios:
  - id: TC-TR-001-01
    name: 정상 예약 (3석)
    given: { passengerId: p-1, flightId: fl-1, fareClass: economy, seatsRequested: 3, availableSeats: 50 }
    when: bookFlight
    then: { status: pending }

  - id: TC-TR-001-02
    name: 최대 좌석 초과 (10석) → E422-ST-MAX
    given: { seatsRequested: 10, availableSeats: 100 }
    when: bookFlight
    then: { error: E422-ST-MAX }

  - id: TC-TR-001-03
    name: 가용 좌석 부족 (8석 요청, 5석만 가용) → E422-ST-AVAIL
    given: { seatsRequested: 8, availableSeats: 5 }
    when: bookFlight
    then: { error: E422-ST-AVAIL }

  - id: TC-TR-002-01
    name: 마일리지 충분 → 이코노미 → 비즈니스 업그레이드
    given: { itinerary: { fare_class: economy, status: confirmed }, availableMiles: 40000 }
    when: upgradeFareClass(business)
    then: { newFare: business, milesDeducted: 30000 }

  - id: TC-TR-002-02
    name: 마일리지 부족 → E422-MILES
    given: { itinerary: { fare_class: economy, status: confirmed }, availableMiles: 10000 }
    when: upgradeFareClass(business)
    then: { error: E422-MILES }

  - id: TC-TR-003-01
    name: 여정 확정 atomic — itineraries confirmed + PNR + trips pending
    given: { itinerary: { status: pending }, paymentAmount: 500000 }
    when: confirmItinerary
    then:
      itineraries.status: confirmed
      pnr: 6자 대문자
      trips.status: pending

  - id: TC-TR-004-01
    name: pending → confirmed 전환
    given: { trip: { status: pending } }
    when: transitionTripStatus(confirmed)
    then: { previousStatus: pending, newStatus: confirmed }

  - id: TC-TR-004-02
    name: confirmed → checked_in 전환
    given: { trip: { status: confirmed } }
    when: transitionTripStatus(checked_in)
    then: { newStatus: checked_in }

  - id: TC-TR-004-03
    name: completed → pending 역전환 → E409-TR
    given: { trip: { status: completed } }
    when: transitionTripStatus(pending)
    then: { error: E409-TR }

  - id: TC-TR-005-01
    name: 결항 배치 — 2건 pending/confirmed trips 취소
    given: { flights: [{ id: fl-1, status: cancelled }], trips: [{ status: pending }, { status: confirmed }] }
    when: markDisruptedTrips(fl-1)
    then: { markedCount: 2, trips.status: cancelled }

  - id: TC-TR-006-01
    name: 취소 환불 atomic — itineraries cancelled + refund_log INSERT
    given: { itinerary: { status: confirmed, paid_amount: 500000, miles_used: 30000 } }
    when: processCancellationRefund
    then:
      itineraries.status: cancelled
      refund_log: inserted
      refundAmount: 500000
      milesRestored: 30000

  - id: TC-TR-006-02
    name: 이미 취소된 여정 환불 → E409-IT
    given: { itinerary: { status: cancelled } }
    when: processCancellationRefund
    then: { error: E409-IT }
