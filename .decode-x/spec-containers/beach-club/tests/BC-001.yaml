---
# BC-001 ThresholdCheck 검증 시나리오
# Beach club 동시 방문자 한도 — F554 Sprint 382

ruleId: BC-001
detector: ThresholdCheck
function: reserveDayPass

scenarios:
  - id: BC-001-PASS
    description: 동시 방문자 수가 한도 미만일 때 예약 성공
    given:
      beach_clubs:
        active_visitors: 499
        max_concurrent_visitors: 500
    when:
      call: reserveDayPass
    then:
      result: success
      ruleId: BC-001
      status: PRESENCE

  - id: BC-001-FAIL
    description: 동시 방문자 수가 한도에 달했을 때 예약 차단
    given:
      beach_clubs:
        active_visitors: 500
        max_concurrent_visitors: 500
    when:
      call: reserveDayPass
    then:
      throws: BeachClubError
      code: E422-CLUB-VISITOR-LIMIT-EXCEEDED
      status: 422
