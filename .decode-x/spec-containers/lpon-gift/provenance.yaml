inputSchema:
  - ruleId: BL-G001
    function: sendGift
    parameters:
      senderId: { type: string, description: "발송자 user ID" }
      receiverId: { type: string, description: "수신자 user ID" }
      giftAmount: { type: number, description: "선물 금액 (원, > 0)" }
      expiresAt: { type: ISO8601, description: "만료 시각 (발송일 + 7일 기본)" }
    returns:
      giftTransactionId: { type: string }
      senderNewBalance: { type: number }
      status: { type: enum, values: [pending] }
    errors: [E422-SENDER-INSUFFICIENT-BALANCE, E404-RECEIVER-NOT-FOUND]

  - ruleId: BL-G002
    function: acceptGift
    parameters:
      giftTransactionId: { type: string }
      receiverId: { type: string, description: "수신자 user ID (인증 필요)" }
    returns:
      receiverNewBalance: { type: number }
      status: { type: enum, values: [accepted] }
      event: { type: string, default: GiftAccepted }
    errors: [E422-GIFT-ALREADY-PROCESSED, E422-GIFT-EXPIRED]

  - ruleId: BL-G003
    function: rejectGift
    parameters:
      giftTransactionId: { type: string }
      receiverId: { type: string }
    returns:
      senderRestoredBalance: { type: number }
      status: { type: enum, values: [rejected] }
      event: { type: string, default: GiftRejected }
    errors: [E422-GIFT-ALREADY-PROCESSED]

  - ruleId: BL-G004
    function: expireGiftBatch
    parameters:
      now: { type: ISO8601, description: "배치 실행 시점 (cron)" }
    returns:
      expiredCount: { type: integer }
      expiredIds: { type: array, items: string }
      events: { type: array, items: GiftExpired }
    errors: []

  - ruleId: BL-G005
    function: cancelGiftBySender
    parameters:
      giftTransactionId: { type: string }
      senderId: { type: string, description: "발송자 (인증 필요)" }
    returns:
      senderRestoredBalance: { type: number }
      status: { type: enum, values: [canceled] }
      event: { type: string, default: GiftCanceled }
    errors: [E422-GIFT-ALREADY-ACCEPTED]

  - ruleId: BL-G006
    function: transferGiftBalance
    parameters:
      senderId: { type: string }
      receiverId: { type: string }
      amount: { type: number }
    returns:
      debitLedgerId: { type: string, description: "발송자 차감 ledger" }
      creditLedgerId: { type: string, description: "수신자 증가 ledger" }
      atomicBoundary: { type: boolean, default: true }
    errors: [GiftTransferFailed]

