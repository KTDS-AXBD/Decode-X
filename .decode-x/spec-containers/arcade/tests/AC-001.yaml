# AC-001 ThresholdCheck 검증 시나리오
# Arcade arcade별 동시 machine 한도 — F562 Sprint 390

ruleId: AC-001
detector: ThresholdCheck
function: enterMachine

scenarios:
  - id: AC-001-PASS
    description: 동시 machine 수가 한도 미만일 때 machine 진입 성공
    given:
      arcades:
        active_machines: 29
        max_concurrent_machines: 30
    when:
      call: enterMachine
    then:
      result: success
      ruleId: AC-001
      status: PRESENCE

  - id: AC-001-FAIL
    description: 동시 machine 수가 한도에 달했을 때 machine 진입 차단
    given:
      arcades:
        active_machines: 30
        max_concurrent_machines: 30
    when:
      call: enterMachine
    then:
      throws: ArcadeError
      code: E422-MACHINE-LIMIT-EXCEEDED
      status: 422
