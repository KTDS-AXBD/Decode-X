# PO-001 ThresholdCheck 검증 시나리오
# Pottery Studio별 동시 wheel 한도 — F565 Sprint 393

ruleId: PO-001
detector: ThresholdCheck
function: reserveWheel

scenarios:
  - id: PO-001-PASS
    description: 동시 wheel 수가 한도 미만일 때 wheel 예약 성공
    given:
      pottery_studios:
        active_wheels: 11
        max_concurrent_wheels: 12
    when:
      call: reserveWheel
    then:
      result: success
      ruleId: PO-001
      status: PRESENCE

  - id: PO-001-FAIL
    description: 동시 wheel 수가 한도에 달했을 때 wheel 예약 차단
    given:
      pottery_studios:
        active_wheels: 12
        max_concurrent_wheels: 12
    when:
      call: reserveWheel
    then:
      throws: PotteryError
      code: E422-WHEEL-LIMIT-EXCEEDED
      status: 422
