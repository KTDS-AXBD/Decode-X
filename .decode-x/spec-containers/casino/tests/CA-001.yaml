# CA-001 ThresholdCheck 검증 시나리오
# Casino floor별 동시 session 한도 — F560 Sprint 388

ruleId: CA-001
detector: ThresholdCheck
function: registerSession

scenarios:
  - id: CA-001-PASS
    description: 동시 session 수가 한도 미만일 때 세션 등록 성공
    given:
      gaming_floors:
        active_sessions: 19
        max_concurrent_sessions: 20
    when:
      call: registerSession
    then:
      result: success
      ruleId: CA-001
      status: PRESENCE

  - id: CA-001-FAIL
    description: 동시 session 수가 한도에 달했을 때 세션 등록 차단
    given:
      gaming_floors:
        active_sessions: 20
        max_concurrent_sessions: 20
    when:
      call: registerSession
    then:
      throws: CasinoError
      code: E422-FLOOR-SESSION-LIMIT-EXCEEDED
      status: 422
