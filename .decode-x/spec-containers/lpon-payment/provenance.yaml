inputSchema:
  - ruleId: BL-013
    function: requestChargeRefund
    parameters:
      companyId: { type: string, description: "회사 ID (요청 주체)" }
      chargeTransactionId: { type: string, description: "환불 대상 충전 ID" }
      requestedAmount: { type: number, description: "환불 요청 금액 (원)" }
    returns:
      refundRequestId: { type: string }
      status: { type: enum, values: [accepted, rejected] }
    errors: [E422-INVALID-REFUND-REQUEST]

  - ruleId: BL-014
    function: cancelPayment
    parameters:
      paymentId: { type: string, description: "결제 ID (status=PAID 대상)" }
      cancelType: { type: enum, values: [FULL, PARTIAL, NETWORK] }
      cancelAmount: { type: number, description: "부분취소 시 취소 금액 (원)" }
    returns:
      cancelTransactionId: { type: string }
      newPaymentStatus: { type: enum, values: [CANCELED, PARTIAL_CANCELED, NETWORK_CANCELED] }
    errors: [E409-PAYMENT-NOT-PAID]

  - ruleId: BL-015
    function: sendPaymentSMS
    parameters:
      paymentId: { type: string }
      paymentAmount: { type: number, description: "결제 금액 (원)" }
      recipientPhone: { type: string, description: "수신자 휴대전화 (마스킹)" }
    returns:
      smsDispatched: { type: boolean }
      messageId: { type: string }
    errors: [SMS_DISPATCH_FAILED]

  - ruleId: BL-016
    function: requestCardCancelApproval
    parameters:
      paymentId: { type: string }
      cardCompanyCode: { type: string, description: "카드사 코드 (예: BC, KB, ...)" }
    returns:
      approvalRequestId: { type: string }
      transmittedToVan: { type: boolean }
    errors: [CARD_VAN_DISPATCH_FAILED]

  - ruleId: BL-017
    function: triggerQrCancelTransmit
    parameters:
      paymentId: { type: string }
      merchantId: { type: string, description: "가맹점 ID" }
      cancelButtonEventTimestamp: { type: ISO8601 }
    returns:
      transmitted: { type: boolean }
      retryCount: { type: integer, default: 0 }
    errors: [VAN_TRANSMIT_FAILED]

  - ruleId: BL-018
    function: completeQrCancelOnApproval
    parameters:
      paymentId: { type: string }
      merchantApprovalTimestamp: { type: ISO8601, description: "가맹점주 취소 승인 시각" }
    returns:
      cancelCompleted: { type: boolean }
      finalStatus: { type: enum, values: [CANCELED, PENDING_APPROVAL] }
    errors: [MERCHANT_NOT_APPROVED]

  - ruleId: BL-019
    function: processWithdrawnUserCancelViaAP06
    parameters:
      paymentId: { type: string }
      withdrawnUserId: { type: string }
    returns:
      ap06Response: { type: object, description: "AP06 API 응답" }
      manualEscalation: { type: boolean, description: "API 실패 시 수기처리 플래그" }
    errors: [AP06_API_FAILED]

